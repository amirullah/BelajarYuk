name: kidlearn_game
description: BelajarYuk! - Game Edukasi Anak SD
publish_to: 'none'
version: 2.1.7+32

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  http: ^1.2.2
  google_sign_in: ^6.2.1
  flutter_tts: ^3.8.5 # read-aloud (versi kompatibel Kotlin 1.9 / SDK 34)
  soundpool: ^2.4.1 # efek suara pendek (benar/salah/level) — ringan, kompatibel Kotlin 1.9
  url_launcher: ^6.3.0 # buka tautan unduh saat menyarankan pembaruan

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_native_splash:
  color: "#2B7FFF"
  image: "assets/img/mascot.png"
  android_12:
    color: "#2B7FFF"
    image: "assets/img/mascot.png"
  android: true
  ios: false

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "assets/icon/icon_bg.png"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/sfx/
    - assets/img/
    - assets/img/subjects/
    - assets/img/ukus/
